name: hile-reports

services:
  operational-db:
    image: postgres:16-alpine
    container_name: hile-operational-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${APP_DB_NAME:-hile_reports}
      POSTGRES_USER: ${APP_DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD:-postgres}
    ports:
      - "${APP_DB_PORT:-5432}:5432"
    volumes:
      - operational-db-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${APP_DB_USERNAME:-postgres} -d ${APP_DB_NAME:-hile_reports}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  operational-db-data:
